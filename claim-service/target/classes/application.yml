spring:
  application:
    name: claim-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 30s

server:
  port: ${SERVER_PORT:8082}
  shutdown: graceful
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.jiteen.claims.claim: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

  info:
    env:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    version: 0.1.0
    description: Claim Management Service for AI Claims Processing Platform

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
    path: /v3/api-docs

  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

  packages-to-scan: com.jiteen.claims.claim

aws:
  region: ${AWS_REGION:ap-south-1}

  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

  secrets-manager:
    enabled: ${AWS_SECRETS_MANAGER_ENABLED:false}

  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:}
