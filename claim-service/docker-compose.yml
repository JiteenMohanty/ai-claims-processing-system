version: '3.8'

# ============================================================================
# Project Archetype: AI-Powered Insurance Claims Processing Platform
# Component: Claim Service Architecture Deployment Stack
# Description: Multi-stage orchestrator orchestration configuration for provisioning 
#              and managing the claim lifecycle processing engine.
# Network Topology: Explicitly joins the pre-provisioned external database network 
#                    mesh initiated by the core identity security stack.
# ============================================================================

services:
  claim-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: claim-service
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8082:8082"

    volumes:
      - claim-uploads:/app/uploads

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8082/actuator/health || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    networks:
      - claims-network

volumes:
  claim-uploads:

networks:
  claims-network:
    external: true