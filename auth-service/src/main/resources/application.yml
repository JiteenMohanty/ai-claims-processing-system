spring:
  application:
    name: auth-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  data:
    redis:
      host: ${REDIS_HOST:localhost}
      port: ${REDIS_PORT:6379}
      timeout: 2s
      lettuce:
        pool:
          max-active: 10
          max-idle: 5
          min-idle: 1

server:
  port: ${SERVER_PORT:8081}
  shutdown: graceful
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.jiteen.claims.auth: DEBUG
  pattern:
    console: "%d{yyyy-MM-dd HH:mm:ss.SSS} [%thread] [%X{correlationId:-}] %-5level %logger{36} - %msg%n"

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics

  endpoint:
    health:
      probes:
        enabled: true
      show-details: never

  info:
    env:
      enabled: true

  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    version: 0.1.0
    description: Authentication Service for AI Claims Processing Platform

springdoc:
  api-docs:
    enabled: ${OPENAPI_ENABLED:true}
    path: /v3/api-docs

  swagger-ui:
    enabled: ${SWAGGER_UI_ENABLED:true}
    path: /swagger-ui.html
    operations-sorter: method
    tags-sorter: alpha

  packages-to-scan: com.jiteen.claims.auth

cache:
  ttl:
    users: ${CACHE_TTL_USERS:1800}

jwt:
  issuer: ${JWT_ISSUER:auth-service}
  secret: ${JWT_SECRET:local-dev-auth-service-secret-key-change-in-production-2026}
  access-token-expiration: ${JWT_ACCESS_TOKEN_EXPIRATION:15m}
  refresh-token-expiration: ${JWT_REFRESH_TOKEN_EXPIRATION:7d}

aws:
  region: ${AWS_REGION:ap-south-1}

  access-key-id: ${AWS_ACCESS_KEY_ID:}
  secret-access-key: ${AWS_SECRET_ACCESS_KEY:}

  secrets-manager:
    enabled: ${AWS_SECRETS_MANAGER_ENABLED:false}

  s3:
    bucket-name: ${AWS_S3_BUCKET_NAME:}