version: '3.8'

# ============================================================================
# Project Archetype: AI-Powered Insurance Claims Processing Platform
# Component: AI Processing Service Deployment Stack
# Description: Deploys the asynchronous AI analysis pipeline worker that
#              consumes claim events, executes intelligent document analysis,
#              risk scoring, and fraud detection, then publishes results.
# Network Topology: Joins the shared external claims-network for Kafka access.
# ============================================================================

services:
  ai-processing-service:
    build:
      context: .
      dockerfile: Dockerfile

    container_name: ai-processing-service
    restart: unless-stopped

    env_file:
      - .env

    ports:
      - "8083:8083"

    healthcheck:
      test:
        [
          "CMD-SHELL",
          "wget --no-verbose --tries=1 --spider http://localhost:8083/actuator/health || exit 1"
        ]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 60s

    networks:
      - claims-network

networks:
  claims-network:
    external: true
