spring:
  application:
    name: ai-processing-service

  profiles:
    active: ${SPRING_PROFILES_ACTIVE:dev}

  lifecycle:
    timeout-per-shutdown-phase: 30s

  kafka:
    bootstrap-servers: ${KAFKA_BOOTSTRAP_SERVERS:localhost:9092}
    consumer:
      group-id: ${KAFKA_CONSUMER_GROUP_ID:ai-processing-service-group}
      auto-offset-reset: earliest
      properties:
        spring.json.trusted.packages: "*"
        spring.json.use.type.headers: false
    producer:
      acks: all
      retries: 3
      properties:
        enable.idempotence: true
        spring.json.add.type.headers: false

server:
  port: ${SERVER_PORT:8083}
  shutdown: graceful
  servlet:
    context-path: /

logging:
  level:
    root: INFO
    com.jiteen.claims.ai: DEBUG

management:
  endpoints:
    web:
      exposure:
        include: health,info,metrics
  endpoint:
    health:
      probes:
        enabled: true
      show-details: never
  info:
    env:
      enabled: true
  metrics:
    tags:
      application: ${spring.application.name}

info:
  app:
    name: ${spring.application.name}
    version: 1.0.0
    description: AI Processing Service for AI Claims Processing Platform

# AI analysis backend selection.
#   ai.provider=simulated (default) — rule-based heuristic analysis, no external calls
#   ai.provider=gemini              — real analysis via Google Gemini free tier (requires GEMINI_API_KEY)
#   ai.provider=claude              — real analysis via Anthropic Claude (requires ANTHROPIC_API_KEY)
ai:
  provider: ${AI_PROVIDER:simulated}
  gemini:
    model: ${GEMINI_MODEL:gemini-2.0-flash}
  claude:
    model: ${CLAUDE_MODEL:claude-opus-4-8}
